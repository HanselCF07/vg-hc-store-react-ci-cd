# k8s-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: vg-hc-store-react-nginx-conf
  namespace: main
data:
  nginx.conf: |
    server {
      listen 80;
      server_name localhost;

      root /usr/share/nginx/html;
      index index.html;

      # SPA (React Router) route management
      location / {
        try_files $uri /index.html;
      }

      # Static resource caching
      location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
      }
    }

